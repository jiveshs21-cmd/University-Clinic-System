<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Clinic - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="logo">
            <i class="fas fa-hospital-symbol"></i> UniClinic
        </div>
        <div class="nav-links">
            <button onclick="location.href='index.html'">Home</button>
            <button onclick="location.href='login.html'" class="active">Login</button>
            <button onclick="location.href='dashboard.html'">Dashboard</button>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h2 style="text-align: center;">Student Login</h2>
            <form onsubmit="event.preventDefault(); location.href='dashboard.html';">
                <div class="form-group">
                    <label>Student ID / Username</label>
                    <input type="text" placeholder="Enter your ID" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
                <button type="button" class="btn btn-outline">Register New Account</button>
            </form>
        </div>
    </div>

    <footer>
