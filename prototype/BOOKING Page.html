<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Clinic - Book Appointment</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="logo">
            <i class="fas fa-hospital-symbol"></i> UniClinic
        </div>
        <div class="nav-links">
            <button onclick="location.href='index.html'">Home</button>
            <button onclick="location.href='login.html'">Login</button>
            <button onclick="location.href='dashboard.html'" class="active">Dashboard</button>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h2>Book Appointment</h2>
            <form onsubmit="handleBooking(event)">
                <div class="form-group">
                    <label>Select Doctor</label>
                    <select id="doctor-select">
                        <option value="Dr. Ali">Dr. Ali (General)</option>
                        <option value="Dr. Sarah">Dr. Sarah (Dental)</option>
                        <option value="Dr. Mike">Dr. Mike (Mental Health)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="date-select" required>
                </div>
                <div class="form-group">
                    <label>Time</label>
                    <select id="time-select">
                        <option>09:00 AM</option>
                        <option>10:30 AM</option>
                        <option>01:00 PM</option>
                        <option>03:45 PM</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Confirm Booking</button>
                <button type="button" class="btn btn-outline" onclick="location.href='dashboard.html'">Cancel</button>
            </form>
        </div>
    </div>

    <footer>
        &copy; 2024 University Clinic System. All rights reserved.
    </footer>

    <script>
        function handleBooking(event) {
            event.preventDefault();
            
            const doctor = document.getElementById('doctor-select').value;
            const date = document.getElementById('date-select').value;
            const time = document.getElementById('time-select').value;

            
            document.getElementById('conf-doctor').innerText = doctor;
            document.getElementById('conf-date').innerText = date;
            document.getElementById('conf-time').innerText = time;

            
            location.href = 'confirmation.html';
        }
    </script>
</body>
</html>
