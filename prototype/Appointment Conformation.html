<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Clinic - Confirmation</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="logo">
            <i class="fas fa-hospital-symbol"></i> UniClinic
        </div>
        <div class="nav-links">
            <button onclick="location.href='index.html'">Home</button>
            <button onclick="location.href='login.html'">Login</button>
            <button onclick="location.href='dashboard.html'" class="active">Dashboard</button>
        </div>
    </nav>

    <div class="container">
        <div class="card success-box">
            <div class="check-circle">
                <i class="fas fa-check"></i>
            </div>
            <h2>Appointment Confirmed!</h2>
            <p style="margin-bottom: 2rem;">Your slot has been reserved successfully.</p>
            
            <div style="text-align: left; background: #f8fafc; padding: 1.5rem; border-radius: 8px;">
                <div class="info-row">
                    <span class="info-label">Doctor</span>
                    <span class="info-value" id="conf-doctor">Dr. Ali</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Date</span>
                    <span class="info-value" id="conf-date">10 May</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Time</span>
                    <span class="info-value" id="conf-time">10:30 AM</span>
                </div>
            </div>

            <button class="btn btn-primary" style="margin-top: 2rem;" onclick="location.href='dashboard.html'">Back to Dashboard</button>
        </div>
    </div>

    <footer>
        &copy; 2024 University Clinic System. All rights reserved.
    </footer>
</body>
</html>
